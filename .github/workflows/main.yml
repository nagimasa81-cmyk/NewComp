
name: Build Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt pip install -r requirements.txt

      - name: Run build bat
        shell: cmd
        run: build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Complaint_Service_Hub_Launcher
          path: dist/Complaint_Service_Hub_Launcher
